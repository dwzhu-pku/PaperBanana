<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1426" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Drop Shadow for Boxes -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    
    <!-- Subtle Glow for Engine Core -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers for Arrows -->
    <marker id="arrow-left-amber" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#F59E0B" />
    </marker>
    <marker id="arrow-right-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B" />
    </marker>
    <marker id="arrow-down-slate" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- HEADER / CORE INSIGHT -->
  <g id="header" transform="translate(100, 30)">
    <rect width="1000" height="100" rx="12" fill="#1E293B" fill-opacity="0.6" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
    <text x="500" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">RuVector: The Semantic Database Engine</text>
    <text x="500" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F59E0B">Core Insight: Think of RuVector as a librarian who understands what every book is ABOUT.</text>
    <text x="500" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#94A3B8">It uses meaning—not keywords—to power six distinct application types from one unified core.</text>
  </g>

  <!-- ========================================== -->
  <!-- CENTRAL ENGINE CORE                        -->
  <!-- ========================================== -->
  <g id="engine-core" transform="translate(420, 160)">
    <!-- Main Engine Container -->
    <rect width="360" height="590" rx="16" fill="#111827" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)" />
    
    <!-- Engine Header -->
    <text x="180" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">RuVector Core Engine</text>
    <text x="180" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Billions of vectors • Sub-millisecond latency</text>

    <!-- Layer 1: Unified API -->
    <g transform="translate(20, 90)">
      <rect width="320" height="80" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1" filter="url(#shadow)"/>
      <text x="160" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F59E0B">Unified API</text>
      <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#E2E8F0">Adapts query behavior per application pattern</text>
    </g>

    <!-- Internal Flow Arrow 1 -->
    <line x1="180" y1="170" x2="180" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arrow-down-slate)" />

    <!-- Layer 2: Execution Engine -->
    <g transform="translate(20, 200)">
      <rect width="320" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
      <text x="160" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Execution Engine</text>
      <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Distributes queries across high-perf clusters</text>
    </g>

    <!-- Internal Flow Arrow 2 -->
    <line x1="180" y1="280" x2="180" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrow-down-slate)" />

    <!-- Layer 3: HNSW Indexing -->
    <g transform="translate(20, 310)">
      <rect width="320" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
      <text x="160" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">HNSW Indexing</text>
      <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Navigates high-dimensional space instantly</text>
    </g>

    <!-- Internal Flow Arrow 3 -->
    <line x1="180" y1="390" x2="180" y2="415" stroke="#475569" stroke-width="2" marker-end="url(#arrow-down-slate)" />

    <!-- Layer 4: Vector Storage -->
    <g transform="translate(20, 420)">
      <rect width="320" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
      <text x="160" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Vector Storage</text>
      <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Persists dense embeddings with high I/O</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- FLOW ROUTING (BUS LINES)                   -->
  <!-- ========================================== -->
  <g id="flow-lines">
    <!-- LEFT BUS -->
    <!-- Trunk -->
    <path d="M 420 290 L 390 290 L 390 620" fill="none" stroke="#F59E0B" stroke-width="2" />
    <!-- Branches -->
    <line x1="420" y1="290" x2="275" y2="290" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-left-amber)" />
    <line x1="390" y1="455" x2="275" y2="455" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-left-amber)" />
    <line x1="390" y1="620" x2="275" y2="620" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-left-amber)" />
    
    <!-- Left Flow Labels -->
    <text x="330" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Semantic Queries</text>
    <text x="330" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Distance Metrics</text>
    <text x="330" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Context Retrieval</text>

    <!-- RIGHT BUS -->
    <!-- Trunk -->
    <path d="M 780 290 L 810 290 L 810 620" fill="none" stroke="#F59E0B" stroke-width="2" />
    <!-- Branches -->
    <line x1="780" y1="290" x2="925" y2="290" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-right-amber)" />
    <line x1="810" y1="455" x2="925" y2="455" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-right-amber)" />
    <line x1="810" y1="620" x2="925" y2="620" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-right-amber)" />

    <!-- Right Flow Labels -->
    <text x="870" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Behavior Vectors</text>
    <text x="870" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Relationship Data</text>
    <text x="870" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Instant Updates</text>
  </g>

  <!-- ========================================== -->
  <!-- LEFT APPLICATIONS                          -->
  <!-- ========================================== -->
  <g id="apps-left">
    <!-- App 1: Semantic Search -->
    <g transform="translate(30, 235)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Semantic Search</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Find content by meaning,</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">not exact keywords.</text>
    </g>

    <!-- App 2: Anomaly Detection -->
    <g transform="translate(30, 400)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Anomaly Detection</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Spot structural outliers</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">in high-dimensional data.</text>
    </g>

    <!-- App 3: RAG Pipelines -->
    <g transform="translate(30, 565)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">RAG Pipelines</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Ground LLM responses</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">in real enterprise data.</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- RIGHT APPLICATIONS                         -->
  <!-- ========================================== -->
  <g id="apps-right">
    <!-- App 4: Recommendations -->
    <g transform="translate(930, 235)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Recommendations</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Match users to items based</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">on behavioral similarity.</text>
    </g>

    <!-- App 5: Knowledge Graphs -->
    <g transform="translate(930, 400)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Knowledge Graphs</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Map semantic relationships</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">between concepts.</text>
    </g>

    <!-- App 6: Real-time Personalization -->
    <g transform="translate(930, 565)">
      <rect width="240" height="110" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
      <text x="120" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">Real-time Personalization</text>
      <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">Adapt user experiences</text>
      <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">instantly based on behavior.</text>
    </g>
  </g>

</svg>