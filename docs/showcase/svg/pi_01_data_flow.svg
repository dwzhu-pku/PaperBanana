<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="client-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.3"/>
    </linearGradient>
    
    <linearGradient id="server-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#312E81" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="persist-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="800" fill="#0B1426"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Core Insight Box -->
  <rect x="40" y="30" width="1120" height="65" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="55" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">CORE INSIGHT: Secure Knowledge Assimilation Pipeline</text>
  <text x="60" y="77" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">Pi's end-to-end architecture transforms raw AI session data into a globally verifiable cognitive graph. Every interaction is cryptographically</text>
  <text x="60" y="97" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">secured, anonymized via differential privacy, and validated through 46 attention mechanisms before permanent decentralized storage.</text>

  <!-- ========================================== -->
  <!-- SECTION 1: CLIENT INBOUND                  -->
  <!-- ========================================== -->
  <rect x="40" y="130" width="1120" height="155" rx="12" fill="url(#client-bg)" stroke="#1E293B" stroke-width="2"/>
  <text x="60" y="155" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">1. INBOUND (CLIENT SIDE)</text>
  <text x="290" y="155" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13">Raw knowledge capture, sanitization, and cryptographic packaging</text>

  <!-- Client Boxes -->
  <!-- 1. Session Input -->
  <rect x="60" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">1. Session Input</text>
  <text x="137" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Raw knowledge</text>
  <text x="137" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">from AI agent session</text>

  <!-- 2. PII Stripping -->
  <rect x="245" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="322" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">2. PII Stripping</text>
  <text x="322" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Auto-removes all</text>
  <text x="322" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">identifiable data</text>

  <!-- 3. SONA Embedding -->
  <rect x="430" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="507" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">3. SONA Embedding</text>
  <text x="507" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Converts content to</text>
  <text x="507" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">high-dim vectors</text>

  <!-- 4. Differential Privacy -->
  <rect x="615" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="692" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">4. Diff. Privacy</text>
  <text x="692" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Adds math noise to</text>
  <text x="692" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">protect contributors</text>

  <!-- 5. RVF Packaging -->
  <rect x="800" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="877" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">5. RVF Packaging</text>
  <text x="877" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Wraps in Cognitive</text>
  <text x="877" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Container metadata</text>

  <!-- 6. Ed25519 Signing -->
  <rect x="985" y="170" width="155" height="95" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1062" y="195" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">6. Ed25519 Signing</text>
  <text x="1062" y="220" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Crypto signature</text>
  <text x="1062" y="240" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">for authenticity</text>

  <!-- Client Arrows -->
  <path d="M 215 217 L 241 217" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 400 217 L 426 217" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 585 217 L 611 217" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 770 217 L 796 217" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 955 217 L 981 217" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>


  <!-- ========================================== -->
  <!-- SECTION 2: TRANSMISSION                    -->
  <!-- ========================================== -->
  <rect x="40" y="305" width="1120" height="85" rx="12" fill="#1A1510" stroke="#78350F" stroke-width="2"/>
  <text x="60" y="330" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">2. TRANSMISSION</text>
  <text x="210" y="330" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13">Secure network transport boundary</text>

  <!-- Transmission Pipeline Path -->
  <path d="M 1062 265 L 1062 347 L 137 347 L 137 425" fill="none" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow-amber)"/>
  
  <!-- Transmission Box -->
  <rect x="460" y="322" width="280" height="50" rx="8" fill="#451A03" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="342" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">HTTPS Secure Transport</text>
  <text x="600" y="362" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Signed RVF Container sent over TLS</text>


  <!-- ========================================== -->
  <!-- SECTION 3: SERVER CORE PROCESSING          -->
  <!-- ========================================== -->
  <rect x="40" y="410" width="800" height="350" rx="12" fill="url(#server-bg)" stroke="#1E293B" stroke-width="2"/>
  <text x="60" y="435" fill="#818CF8" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">3. CORE PROCESSING (SERVER)</text>
  <text x="340" y="435" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13">Verification, graph integration, and anomaly detection</text>

  <!-- Server Row 1 Boxes -->
  <!-- 7. Signature Verification -->
  <rect x="60" y="455" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="480" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">7. Sig Verification</text>
  <text x="137" y="505" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Checks Ed25519 sig</text>
  <text x="137" y="525" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">against public key</text>

  <!-- 8. Witness Chain -->
  <rect x="255" y="455" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="332" y="480" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">8. Witness Chain</text>
  <text x="332" y="505" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Adds tamper-proof</text>
  <text x="332" y="525" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">audit trail entry</text>

  <!-- 9. Rate Limiting -->
  <rect x="450" y="455" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="527" y="480" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">9. Rate Limiting</text>
  <text x="527" y="505" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Token bucket + nonce</text>
  <text x="527" y="525" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">prevents abuse</text>

  <!-- 10. Storage Cache -->
  <rect x="645" y="455" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="722" y="480" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">10. Storage Cache</text>
  <text x="722" y="505" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">In-memory cache +</text>
  <text x="722" y="525" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">persistent write-through</text>

  <!-- Server Row 1 Arrows -->
  <path d="M 215 505 L 251 505" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <path d="M 410 505 L 446 505" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <path d="M 605 505 L 641 505" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>

  <!-- Server Return Arrow (Row 1 to Row 2) -->
  <path d="M 722 555 L 722 580 L 137 580 L 137 615" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>

  <!-- Server Row 2 Boxes -->
  <!-- 11. Graph Integration -->
  <rect x="60" y="625" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="650" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">11. Graph Integration</text>
  <text x="137" y="675" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">GNN + HNSW indexes</text>
  <text x="137" y="695" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">similarity graph</text>

  <!-- 12. Quality Ranking -->
  <rect x="255" y="625" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="332" y="650" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">12. Quality Ranking</text>
  <text x="332" y="675" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">46 attention mechs</text>
  <text x="332" y="695" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">evaluate relevance</text>

  <!-- 13. Anomaly Monitor -->
  <rect x="450" y="625" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="527" y="650" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">13. Anomaly Monitor</text>
  <text x="527" y="675" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Delta drift &amp; SNN</text>
  <text x="527" y="695" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">attractors watch</text>

  <!-- 14. Aggregation -->
  <rect x="645" y="625" width="155" height="100" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="722" y="650" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">14. Aggregation</text>
  <text x="722" y="675" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Byzantine FedAvg</text>
  <text x="722" y="695" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">reputation weight</text>

  <!-- Server Row 2 Arrows -->
  <path d="M 215 675 L 251 675" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <path d="M 410 675 L 446 675" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <path d="M 605 675 L 641 675" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow-indigo)"/>


  <!-- ========================================== -->
  <!-- PERSISTENCE SECTION                        -->
  <!-- ========================================== -->
  <rect x="860" y="410" width="300" height="350" rx="12" fill="url(#persist-bg)" stroke="#059669" stroke-width="2"/>
  <text x="880" y="435" fill="#34D399" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">PERSISTENCE</text>
  <text x="880" y="455" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13">Immutable storage layers</text>

  <!-- Arrow from Server to Persistence -->
  <path d="M 800 675 L 876 675" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <text x="838" y="665" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">write</text>

  <!-- Persistence Boxes -->
  <!-- Documents -->
  <rect x="880" y="475" width="260" height="70" rx="8" fill="#022C22" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="498" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Documents</text>
  <text x="1010" y="520" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Metadata, contributor info, graph edges</text>

  <!-- Objects -->
  <rect x="880" y="565" width="260" height="70" rx="8" fill="#022C22" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="588" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Objects</text>
  <text x="1010" y="610" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Cognitive containers (.rvf file format)</text>

  <!-- Vault -->
  <rect x="880" y="655" width="260" height="70" rx="8" fill="#022C22" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="678" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Vault</text>
  <text x="1010" y="700" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Signing credentials and secure keys</text>

</svg>