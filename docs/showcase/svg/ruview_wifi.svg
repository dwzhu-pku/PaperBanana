<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1426" />
      <stop offset="100%" stop-color="#080E1A" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Arrowhead Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6" />
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#6366F1" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F97316" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- Header Section -->
  <text x="40" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">RuView: Seeing Through Walls with WiFi</text>
  <text x="40" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#CBD5E1">By analyzing how standard WiFi signals bounce off the human body, RuView reconstructs accurate 3D poses without</text>
  <text x="40" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#CBD5E1">cameras. This enables privacy-preserving human sensing that works through walls and in complete darkness.</text>

  <!-- ========================================== -->
  <!-- ZONE 1: PHYSICAL ENVIRONMENT (TOP)         -->
  <!-- ========================================== -->
  
  <rect x="40" y="140" width="1120" height="230" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="60" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#64748B" letter-spacing="1">PHYSICAL ENVIRONMENT (REAL WORLD)</text>

  <!-- 1. WiFi Transmitter (TX) -->
  <g transform="translate(120, 20)">
    <!-- Icon -->
    <rect x="60" y="190" width="60" height="20" rx="4" fill="#1E293B" stroke="#F97316" stroke-width="2" />
    <line x1="70" y1="190" x2="60" y2="160" stroke="#F97316" stroke-width="3" stroke-linecap="round" />
    <line x1="110" y1="190" x2="120" y2="160" stroke="#F97316" stroke-width="3" stroke-linecap="round" />
    <circle cx="60" cy="160" r="3" fill="#F97316" />
    <circle cx="120" cy="160" r="3" fill="#F97316" />
    <circle cx="90" cy="200" r="4" fill="#10B981" />
    
    <!-- Text -->
    <text x="90" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">1. WiFi Transmitter (TX)</text>
    <text x="90" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Standard WiFi router emits</text>
    <text x="90" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">continuous 2.4/5GHz signals</text>
  </g>

  <!-- Waves: TX to Wall -->
  <path d="M 270 200 A 30 30 0 0 1 270 240" fill="none" stroke="#F97316" stroke-width="2" />
  <path d="M 285 185 A 50 50 0 0 1 285 255" fill="none" stroke="#F97316" stroke-width="2" />
  <path d="M 300 170 A 70 70 0 0 1 300 270" fill="none" stroke="#F97316" stroke-width="2" />

  <!-- 2. Signal Propagation (Wall) -->
  <g transform="translate(400, 20)">
    <!-- Icon (Brick Wall) -->
    <rect x="0" y="150" width="40" height="100" fill="#475569" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="170" x2="40" y2="170" stroke="#334155" stroke-width="2" />
    <line x1="0" y1="190" x2="40" y2="190" stroke="#334155" stroke-width="2" />
    <line x1="0" y1="210" x2="40" y2="210" stroke="#334155" stroke-width="2" />
    <line x1="0" y1="230" x2="40" y2="230" stroke="#334155" stroke-width="2" />
    <line x1="20" y1="150" x2="20" y2="170" stroke="#334155" stroke-width="2" />
    <line x1="10" y1="170" x2="10" y2="190" stroke="#334155" stroke-width="2" />
    <line x1="30" y1="170" x2="30" y2="190" stroke="#334155" stroke-width="2" />
    <line x1="20" y1="190" x2="20" y2="210" stroke="#334155" stroke-width="2" />
    <line x1="10" y1="210" x2="10" y2="230" stroke="#334155" stroke-width="2" />
    <line x1="30" y1="210" x2="30" y2="230" stroke="#334155" stroke-width="2" />
    <line x1="20" y1="230" x2="20" y2="250" stroke="#334155" stroke-width="2" />
    
    <!-- Text -->
    <text x="20" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">2. Signal Propagation</text>
    <text x="20" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Radio waves easily penetrate</text>
    <text x="20" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">walls, furniture &amp; obstacles</text>
  </g>

  <!-- Waves: Wall to Human (Penetrating) -->
  <path d="M 470 200 A 30 30 0 0 1 470 240" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="4,4" opacity="0.8" />
  <path d="M 485 185 A 50 50 0 0 1 485 255" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="4,4" opacity="0.8" />
  <path d="M 500 170 A 70 70 0 0 1 500 270" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="4,4" opacity="0.8" />

  <!-- 3. Body Reflection -->
  <g transform="translate(560, 20)">
    <!-- Icon (Human Figure) -->
    <circle cx="90" cy="160" r="14" fill="#F59E0B" />
    <line x1="90" y1="174" x2="90" y2="215" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" />
    <line x1="90" y1="185" x2="65" y2="205" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" />
    <line x1="90" y1="185" x2="115" y2="195" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" />
    <line x1="90" y1="215" x2="75" y2="250" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" />
    <line x1="90" y1="215" x2="105" y2="250" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" />
    
    <!-- Text -->
    <text x="90" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">3. Body Reflection</text>
    <text x="90" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Signals bounce off the body;</text>
    <text x="90" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">each limb reflects differently</text>
  </g>

  <!-- Waves: Human to RX (Reflected) -->
  <path d="M 770 200 A 30 30 0 0 1 770 240" fill="none" stroke="#3B82F6" stroke-width="2" />
  <path d="M 790 185 A 50 50 0 0 1 790 255" fill="none" stroke="#3B82F6" stroke-width="2" />
  <path d="M 810 170 A 70 70 0 0 1 810 270" fill="none" stroke="#3B82F6" stroke-width="2" />

  <!-- 4. WiFi Receiver (RX) -->
  <g transform="translate(900, 20)">
    <!-- Icon -->
    <rect x="60" y="190" width="60" height="20" rx="4" fill="#1E293B" stroke="#3B82F6" stroke-width="2" />
    <line x1="65" y1="190" x2="55" y2="160" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <line x1="75" y1="190" x2="70" y2="155" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <line x1="90" y1="190" x2="90" y2="150" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <line x1="105" y1="190" x2="110" y2="155" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <line x1="115" y1="190" x2="125" y2="160" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <circle cx="55" cy="160" r="2" fill="#3B82F6" />
    <circle cx="70" cy="155" r="2" fill="#3B82F6" />
    <circle cx="90" cy="150" r="2" fill="#3B82F6" />
    <circle cx="110" cy="155" r="2" fill="#3B82F6" />
    <circle cx="125" cy="160" r="2" fill="#3B82F6" />
    <circle cx="90" cy="200" r="4" fill="#10B981" />
    
    <!-- Text -->
    <text x="90" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">4. WiFi Receiver (RX)</text>
    <text x="90" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Antenna array captures the</text>
    <text x="90" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">reflected, distorted signals</text>
  </g>


  <!-- ========================================== -->
  <!-- DATA FLOW ARROW (Connecting Zone 1 & 2)    -->
  <!-- ========================================== -->
  
  <path d="M 990 340 L 990 405 L 190 405 L 190 480" fill="none" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrow-blue)" />
  <rect x="470" y="393" width="240" height="24" rx="4" fill="#0B1426" />
  <text x="590" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#60A5FA" text-anchor="middle">Reflected Signal Data (CSI) Flow</text>


  <!-- ========================================== -->
  <!-- ZONE 2: DIGITAL PROCESSING PIPELINE (LEFT) -->
  <!-- ========================================== -->
  
  <rect x="40" y="440" width="820" height="320" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="60" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#64748B" letter-spacing="1">DIGITAL PROCESSING PIPELINE</text>

  <!-- 5. CSI Extraction -->
  <g transform="translate(70, 0)">
    <!-- Inner Box -->
    <rect x="0" y="490" width="200" height="240" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    
    <!-- Graphic -->
    <rect x="50" y="510" width="100" height="60" rx="4" fill="#0F172A" />
    <!-- Grid -->
    <line x1="50" y1="530" x2="150" y2="530" stroke="#334155" stroke-width="1" />
    <line x1="50" y1="550" x2="150" y2="550" stroke="#334155" stroke-width="1" />
    <line x1="83" y1="510" x2="83" y2="570" stroke="#334155" stroke-width="1" />
    <line x1="116" y1="510" x2="116" y2="570" stroke="#334155" stroke-width="1" />
    <!-- Waves -->
    <path d="M 50 540 Q 75 510 100 540 T 150 540" fill="none" stroke="#3B82F6" stroke-width="3" />
    <path d="M 50 540 Q 75 570 100 540 T 150 540" fill="none" stroke="#F97316" stroke-width="2" opacity="0.8" />
    
    <!-- Text -->
    <text x="100" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">5. CSI Extraction</text>
    <text x="100" y="645" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Extracts Channel State Info</text>
    <text x="100" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">(amplitude and phase data)</text>
    <text x="100" y="685" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">from radio environment</text>
  </g>

  <!-- Arrow 5 -> 6 -->
  <line x1="280" y1="540" x2="340" y2="540" stroke="#6366F1" stroke-width="3" marker-end="url(#arrow-indigo)" />
  <text x="310" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#818CF8" text-anchor="middle">CSI Matrix</text>

  <!-- 6. DensePose Neural Network -->
  <g transform="translate(350, 0)">
    <!-- Inner Box -->
    <rect x="0" y="490" width="200" height="240" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    
    <!-- Graphic (Neural Net) -->
    <rect x="50" y="510" width="100" height="60" rx="4" fill="#0F172A" />
    <!-- Connections -->
    <line x1="65" y1="525" x2="100" y2="520" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="65" y1="525" x2="100" y2="540" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="65" y1="555" x2="100" y2="540" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="65" y1="555" x2="100" y2="560" stroke="#4F46E5" stroke-width="1.5" />
    
    <line x1="100" y1="520" x2="135" y2="525" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="100" y1="540" x2="135" y2="525" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="100" y1="540" x2="135" y2="555" stroke="#4F46E5" stroke-width="1.5" />
    <line x1="100" y1="560" x2="135" y2="555" stroke="#4F46E5" stroke-width="1.5" />
    <!-- Nodes -->
    <circle cx="65" cy="525" r="4" fill="#818CF8" />
    <circle cx="65" cy="555" r="4" fill="#818CF8" />
    
    <circle cx="100" cy="520" r="4" fill="#818CF8" />
    <circle cx="100" cy="540" r="4" fill="#818CF8" />
    <circle cx="100" cy="560" r="4" fill="#818CF8" />
    
    <circle cx="135" cy="525" r="4" fill="#818CF8" />
    <circle cx="135" cy="555" r="4" fill="#818CF8" />
    
    <!-- Text -->
    <text x="100" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">6. Deep Learning Model</text>
    <text x="100" y="645" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Neural network translates</text>
    <text x="100" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">CSI data into dense human</text>
    <text x="100" y="685" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">body surface maps</text>
  </g>

  <!-- Arrow 6 -> 7 -->
  <line x1="560" y1="540" x2="620" y2="540" stroke="#6366F1" stroke-width="3" marker-end="url(#arrow-indigo)" />
  <text x="590" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#818CF8" text-anchor="middle">Body Maps</text>

  <!-- 7. 3D Pose Output -->
  <g transform="translate(630, 0)">
    <!-- Inner Box -->
    <rect x="0" y="490" width="200" height="240" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    
    <!-- Graphic (3D Stick Figure) -->
    <rect x="50" y="510" width="100" height="60" rx="4" fill="#0F172A" />
    <circle cx="100" cy="522" r="6" fill="none" stroke="#10B981" stroke-width="2" />
    <!-- Spine -->
    <line x1="100" y1="528" x2="100" y2="548" stroke="#10B981" stroke-width="2" />
    <!-- Arms -->
    <line x1="100" y1="532" x2="85" y2="540" stroke="#10B981" stroke-width="2" />
    <line x1="85" y1="540" x2="78" y2="532" stroke="#10B981" stroke-width="2" />
    <line x1="100" y1="532" x2="115" y2="540" stroke="#10B981" stroke-width="2" />
    <line x1="115" y1="540" x2="110" y2="550" stroke="#10B981" stroke-width="2" />
    <!-- Legs -->
    <line x1="100" y1="548" x2="90" y2="560" stroke="#10B981" stroke-width="2" />
    <line x1="90" y1="560" x2="88" y2="568" stroke="#10B981" stroke-width="2" />
    <line x1="100" y1="548" x2="110" y2="560" stroke="#10B981" stroke-width="2" />
    <line x1="110" y1="560" x2="115" y2="568" stroke="#10B981" stroke-width="2" />
    <!-- Joints -->
    <circle cx="100" cy="532" r="2.5" fill="#34D399" />
    <circle cx="85" cy="540" r="2.5" fill="#34D399" />
    <circle cx="78" cy="532" r="2.5" fill="#34D399" />
    <circle cx="115" cy="540" r="2.5" fill="#34D399" />
    <circle cx="110" cy="550" r="2.5" fill="#34D399" />
    <circle cx="100" cy="548" r="2.5" fill="#34D399" />
    <circle cx="90" cy="560" r="2.5" fill="#34D399" />
    <circle cx="88" cy="568" r="2.5" fill="#34D399" />
    <circle cx="110" cy="560" r="2.5" fill="#34D399" />
    <circle cx="115" cy="568" r="2.5" fill="#34D399" />
    
    <!-- Text -->
    <text x="100" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">7. 3D Pose Output</text>
    <text x="100" y="645" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Full body pose estimation</text>
    <text x="100" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">with highly accurate 3D</text>
    <text x="100" y="685" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">skeletal joint positions</text>
  </g>


  <!-- ========================================== -->
  <!-- ZONE 3: KEY ADVANTAGES (RIGHT)             -->
  <!-- ========================================== -->
  
  <rect x="880" y="440" width="300" height="320" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)" />
  <text x="900" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#F59E0B">Core Advantages</text>

  <!-- Item 1: Works Through Walls -->
  <g transform="translate(900, 495)">
    <!-- Icon -->
    <rect x="0" y="5" width="8" height="20" fill="#64748B" />
    <line x1="-5" y1="15" x2="20" y2="15" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-orange)" />
    <!-- Text -->
    <text x="35" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#F8FAFC">Works Through Walls</text>
    <text x="35" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Radio waves penetrate</text>
    <text x="35" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">physical barriers</text>
  </g>

  <!-- Item 2: Absolute Privacy -->
  <g transform="translate(900, 560)">
    <!-- Icon -->
    <rect x="2" y="10" width="16" height="12" rx="2" fill="#10B981" />
    <path d="M 5 10 V 6 A 5 5 0 0 1 15 6 V 10" fill="none" stroke="#10B981" stroke-width="2" />
    <!-- Text -->
    <text x="35" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#F8FAFC">Absolute Privacy</text>
    <text x="35" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">No optical cameras or</text>
    <text x="35" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">identifiable images</text>
  </g>

  <!-- Item 3: Works in Darkness -->
  <g transform="translate(900, 625)">
    <!-- Icon -->
    <path d="M 15 15 A 8 8 0 1 0 5 25 A 10 10 0 0 1 15 15" fill="#FBBF24" />
    <!-- Text -->
    <text x="35" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#F8FAFC">Works in Darkness</text>
    <text x="35" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Unaffected by ambient</text>
    <text x="35" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">lighting conditions</text>
  </g>

  <!-- Item 4: Uses Existing Tech -->
  <g transform="translate(900, 690)">
    <!-- Icon -->
    <circle cx="10" cy="22" r="2" fill="#3B82F6" />
    <path d="M 5 17 A 7 7 0 0 1 15 17" fill="none" stroke="#3B82F6" stroke-width="2" />
    <path d="M 1 13 A 12 12 0 0 1 19 13" fill="none" stroke="#3B82F6" stroke-width="2" />
    <!-- Text -->
    <text x="35" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#F8FAFC">Uses Existing Tech</text>
    <text x="35" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Leverages standard consumer</text>
    <text x="35" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">WiFi hardware</text>
  </g>

</svg>