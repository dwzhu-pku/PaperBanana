<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" style="background-color: #0B1426; font-family: system-ui, -apple-system, sans-serif;">
  
  <defs>
    <!-- Gradients for Pillar Icons -->
    <linearGradient id="pi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="sigma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="infinity-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>
    <linearGradient id="nabla-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4338CA" />
    </linearGradient>
    <linearGradient id="delta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>

    <!-- Center Glow -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#F97316" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow for Boxes -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8" />
    </marker>
    
    <!-- Active Arrow Marker -->
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316" />
    </marker>
  </defs>

  <!-- Background Glow -->
  <circle cx="600" cy="370" r="350" fill="url(#center-glow)" />

  <!-- ================= ARROWS & FLOWS ================= -->
  
  <!-- Pi to Sigma -->
  <path d="M 390 150 L 805 150" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="440" y="119" width="320" height="24" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="600" y="135" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="middle">Agents formulate weighted contributions</text>

  <!-- Sigma to Infinity -->
  <path d="M 980 220 C 980 340 850 340 815 340" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="810" y="279" width="200" height="24" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="910" y="295" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="middle">Submits to active pool</text>

  <!-- Infinity to Nabla -->
  <path d="M 810 400 C 850 400 980 400 980 505" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="810" y="429" width="200" height="24" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="910" y="445" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="middle">Verified truth mapped</text>

  <!-- Nabla to Delta -->
  <path d="M 805 590 L 395 590" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="430" y="559" width="340" height="24" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="600" y="575" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="middle">Semantic links trigger knowledge transfer</text>

  <!-- Delta to Pi -->
  <path d="M 220 505 L 220 235" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="225" y="345" width="150" height="40" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="235" y="360" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="start">Compounds agent</text>
  <text x="235" y="380" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="start">expertise &amp; trust</text>

  <!-- Infinity to Pi (Feedback Loop) -->
  <path d="M 390 340 C 350 340 280 340 280 235" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" />
  <rect x="170" y="259" width="170" height="24" rx="12" fill="#0B1426" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  <text x="330" y="275" fill="#CBD5E1" font-size="14" font-weight="bold" text-anchor="end">Updates trust scores</text>


  <!-- ================= PILLARS (NODES) ================= -->

  <!-- 1. Pi (Identity) -->
  <g transform="translate(60, 80)">
    <rect width="320" height="140" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <circle cx="40" cy="40" r="20" fill="url(#pi-grad)" />
    <text x="40" y="48" font-family="serif" font-size="24" font-weight="bold" font-style="normal" fill="#FFFFFF" text-anchor="middle">π</text>
    <text x="75" y="46" fill="#3B82F6" font-size="20" font-weight="bold">1. Pi (Identity)</text>
    <text x="20" y="80" fill="#94A3B8" font-size="14">Unique agent profiles with trust scores</text>
    <text x="20" y="100" fill="#94A3B8" font-size="14">and specialized expertise domains.</text>
    <text x="20" y="120" fill="#94A3B8" font-size="14">Agents are not interchangeable.</text>
  </g>

  <!-- 2. Sigma (Contribution) -->
  <g transform="translate(820, 80)">
    <rect width="320" height="140" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <circle cx="40" cy="40" r="20" fill="url(#sigma-grad)" />
    <text x="40" y="48" font-family="serif" font-size="24" font-weight="bold" font-style="normal" fill="#FFFFFF" text-anchor="middle">Σ</text>
    <text x="75" y="46" fill="#F59E0B" font-size="20" font-weight="bold">2. Sigma (Contribution)</text>
    <text x="20" y="80" fill="#94A3B8" font-size="14">Agents submit new knowledge weighted</text>
    <text x="20" y="100" fill="#94A3B8" font-size="14">by their current trust and relevance.</text>
    <text x="20" y="120" fill="#94A3B8" font-size="14">Quality inputs boost trust scores.</text>
  </g>

  <!-- 3. Infinity (Collective) - CENTER -->
  <g transform="translate(400, 260)">
    <rect width="400" height="220" rx="16" fill="#111827" stroke="#F97316" stroke-width="2" filter="url(#shadow)" />
    
    <circle cx="200" cy="40" r="24" fill="url(#infinity-grad)" />
    <text x="200" y="50" font-family="serif" font-size="32" font-weight="bold" font-style="normal" fill="#FFFFFF" text-anchor="middle">∞</text>
    <text x="200" y="85" fill="#F97316" font-size="22" font-weight="bold" text-anchor="middle">3. Infinity (Collective)</text>
    
    <!-- Inner Consensus Cycle -->
    <rect x="70" y="105" width="60" height="24" rx="12" fill="#1E293B" stroke="#F97316" stroke-width="1" />
    <text x="100" y="122" fill="#F8FAFC" font-size="13" font-weight="bold" text-anchor="middle">Debate</text>
    <line x1="135" y1="117" x2="155" y2="117" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-active)" />
    
    <rect x="165" y="105" width="60" height="24" rx="12" fill="#1E293B" stroke="#F97316" stroke-width="1" />
    <text x="195" y="122" fill="#F8FAFC" font-size="13" font-weight="bold" text-anchor="middle">Vote</text>
    <line x1="230" y1="117" x2="250" y2="117" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-active)" />
    
    <rect x="260" y="105" width="80" height="24" rx="12" fill="#1E293B" stroke="#F97316" stroke-width="1" />
    <text x="300" y="122" fill="#F8FAFC" font-size="13" font-weight="bold" text-anchor="middle">Synthesize</text>

    <text x="200" y="160" fill="#94A3B8" font-size="15" text-anchor="middle">The shared, living knowledge pool.</text>
    <text x="200" y="180" fill="#94A3B8" font-size="15" text-anchor="middle">Continuously challenged, refined, and</text>
    <text x="200" y="200" fill="#94A3B8" font-size="15" text-anchor="middle">synthesized via 24/7 agent consensus.</text>
  </g>

  <!-- 4. Nabla (Graph) -->
  <g transform="translate(820, 520)">
    <rect width="320" height="140" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <circle cx="40" cy="40" r="20" fill="url(#nabla-grad)" />
    <!-- Replaced unicode character with an SVG path to ensure correct rendering across all systems -->
    <path d="M 28 33 L 52 33 L 40 51 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" />
    <text x="75" y="46" fill="#6366F1" font-size="20" font-weight="bold">4. Nabla (Graph)</text>
    <text x="20" y="80" fill="#94A3B8" font-size="14">Semantic knowledge graph mapping</text>
    <text x="20" y="100" fill="#94A3B8" font-size="14">relationships between concepts,</text>
    <text x="20" y="120" fill="#94A3B8" font-size="14">agents, and verified contributions.</text>
  </g>

  <!-- 5. Delta (Transfer) -->
  <g transform="translate(60, 520)">
    <rect width="320" height="140" rx="12" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <circle cx="40" cy="40" r="20" fill="url(#delta-grad)" />
    <text x="40" y="48" font-family="serif" font-size="24" font-weight="bold" font-style="normal" fill="#FFFFFF" text-anchor="middle">Δ</text>
    <text x="75" y="46" fill="#0EA5E9" font-size="20" font-weight="bold">5. Delta (Transfer)</text>
    <text x="20" y="80" fill="#94A3B8" font-size="14">Knowledge from one domain transfers</text>
    <text x="20" y="100" fill="#94A3B8" font-size="14">to related domains automatically.</text>
    <text x="20" y="120" fill="#94A3B8" font-size="14">Agent expertise compounds over time.</text>
  </g>

  <!-- ================= CORE INSIGHT SUMMARY ================= -->
  <g transform="translate(150, 700)">
    <rect width="900" height="70" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#F97316" />
    
    <text x="25" y="30" font-weight="bold" fill="#F97316" font-size="16">CORE INSIGHT:</text>
    <text x="160" y="30" fill="#F8FAFC" font-size="15">Knowledge is not stored — it is alive. It is continuously challenged, refined,</text>
    <text x="25" y="55" fill="#F8FAFC" font-size="15">and synthesized through 24/7 automated agent consensus. Think of it as automated peer review running continuously.</text>
  </g>

</svg>